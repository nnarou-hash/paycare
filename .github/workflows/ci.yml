name: CI PayCare ETL Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t paycare-etl .

      - name: Run Docker container
        run: docker run --rm -v ${{ github.workspace }}/data:/app/data paycare-etl

      - name: Upload processed CSV as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-data
          path: data/output_data.csv
